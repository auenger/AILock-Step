name: feature-workflow-lockstep
version: 1.0.0
description: |
  Feature Workflow - LockStep Edition

  基于 AILock-Step 协议的特性开发工作流系统。

  核心改进:
  - STP 状态锚定，强制顺序执行
  - ?? 门控强制验证
  - stp_pointer 精确恢复
  - 自动循环调度

author: Ryan Yang
tags:
  - workflow
  - feature
  - lockstep
  - ailock
  - parallel-development

skills:
  - name: lockstep-new-feature
    description: 创建新 feature (LockStep 版)
    file: skills/lockstep-new-feature.md

  - name: lockstep-start-feature
    description: 启动 feature 开发 (LockStep 版)
    file: skills/lockstep-start-feature.md

  - name: lockstep-verify-feature
    description: 验证 feature (LockStep 版)
    file: skills/lockstep-verify-feature.md

  - name: lockstep-complete-feature
    description: 完成 feature (LockStep 版)
    file: skills/lockstep-complete-feature.md

  - name: lockstep-list-features
    description: 列出所有 features (LockStep 版)
    file: skills/lockstep-list-features.md

  - name: lockstep-parallel-dev
    description: 并行开发编排器 (LockStep 版)
    file: skills/lockstep-parallel-dev.md

  - name: lockstep-feature-agent
    description: Feature Agent 执行协议 (LockStep 版)
    file: skills/lockstep-feature-agent.md

agents:
  - name: lockstep-feature-manager
    description: 特性管理器 Agent (LockStep 版)
    file: agents/lockstep-feature-manager.md

workflows:
  - name: lockstep-feature-lifecycle
    description: 特性生命周期工作流 (LockStep 版)
    file: workflows/lockstep-feature-lifecycle.md

scripts:
  - name: lockstep-start-feature-agent
    description: 启动 LockStep Feature Agent
    file: scripts/lockstep-start-feature-agent.sh

templates:
  - name: lockstep-status
    description: LockStep 状态文件模板
    file: templates/lockstep-status.yaml

dependencies:
  - feature-workflow (共享 queue.yaml 和 features/ 目录)

configuration:
  config_file: config.yaml
  queue_file: feature-workflow/queue.yaml
  features_dir: features/
