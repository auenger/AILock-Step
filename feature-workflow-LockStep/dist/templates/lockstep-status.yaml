# LockStep Feature Status Template
# 此文件记录执行状态，用于断点恢复

feature_id: feat-xxx
feature_name: Feature 名称
status: initialized | started | implementing | verifying | completing | done | blocked | error
stage: init | implement | verify | complete
stp_pointer: STP-000
stp_history:
  - STP-000

progress:
  tasks_total: 0
  tasks_done: 0
  current_task: null

started_at: 2026-03-05T00:00:00Z
updated_at: 2026-03-05T00:00:00Z

# LockStep 检查点
checkpoint:
  last_stp: STP-000
  timestamp: 2026-03-05T00:00:00Z
  registers: {}

# 完成时填充
completion:
  commit: null
  finished_at: null

# 阻塞时填充
blocked:
  reason: null
  details: null
  stp: null

# 错误时填充
error:
  type: null
  message: null
  stp: null
